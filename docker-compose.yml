services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spotify_wrapped
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/spotify_wrapped
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
